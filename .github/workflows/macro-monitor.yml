name: Macro Monitor

on:
  schedule:
    # 每小時執行一次（含假日）
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'brief / alert / both'
        required: false
        default: 'both'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Determine mode
        id: mode
        run: |
          HOUR=$(TZ=Asia/Taipei date +%H)
          INPUT_MODE="${{ inputs.mode || '' }}"
          if [ -n "$INPUT_MODE" ]; then
            echo "mode=$INPUT_MODE" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "08" ]; then
            echo "mode=brief" >> $GITHUB_OUTPUT
          else
            echo "mode=both" >> $GITHUB_OUTPUT
          fi
          echo "Current TW hour: $HOUR"

      - name: Run Macro Monitor
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          FLAGS=""
          if [ "$MODE" = "brief" ] || [ "$MODE" = "both" ]; then
            FLAGS="$FLAGS --brief"
          fi
          if [ "$MODE" = "alert" ] || [ "$MODE" = "both" ]; then
            FLAGS="$FLAGS --alert"
          fi
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            FLAGS="$FLAGS --line"
          fi
          python scripts/macro_monitor.py $FLAGS

      - name: Watchdog — trigger Morning Brief if stale
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if news_analysis.json is older than 20 hours
          if [ -f "data/news_analysis.json" ]; then
            UPDATED=$(python3 -c "import json; print(json.load(open('data/news_analysis.json')).get('updated_at','')[:10])")
            TODAY=$(TZ=Asia/Taipei date +%Y-%m-%d)
            TW_HOUR=$(TZ=Asia/Taipei date +%H)
            echo "News date: $UPDATED, Today: $TODAY, TW hour: $TW_HOUR"
            # Only trigger between 07:00-23:00 TW, and only if news is not from today
            if [ "$UPDATED" != "$TODAY" ] && [ "$TW_HOUR" -ge 7 ]; then
              echo "News is stale ($UPDATED != $TODAY), triggering Morning Brief..."
              gh workflow run morning-brief.yml
              echo "Morning Brief triggered!"
            else
              echo "News is fresh or outside trigger window"
            fi
          else
            echo "news_analysis.json not found, skipping watchdog"
          fi

      - name: Write macro update timestamp
        run: |
          python -c "
          import json
          from datetime import datetime, timezone, timedelta
          tw = timezone(timedelta(hours=8))
          now = datetime.now(tw)
          status = {'macro_updated_at': now.isoformat(), 'status': 'success'}
          with open('data/macro_status.json', 'w') as f:
            json.dump(status, f, indent=2)
          "

      - name: Commit updated indices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/strategy.json data/indices_history.json data/macro_status.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "📡 Macro update: $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
            git pull --rebase
            git push
          fi

  notify-failure:
    runs-on: ubuntu-latest
    needs: monitor
    if: failure()
    steps:
      - name: Send failure notification
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            MSG=$'\n❌ Macro Monitor 失敗\n📅 '"$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"$'\n🔗 '"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            curl -s -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" -d "message=$MSG"
          fi
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            MSG="❌ Macro Monitor 失敗 📅 $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M') 🔗 $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"${MSG}\"}"
          fi
