name: Deploy Frontend

on:
  # Trigger on direct push (won't fire from GITHUB_TOKEN pushes)
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
  # Trigger after data-producing workflows complete (bypasses GITHUB_TOKEN limitation)
  workflow_run:
    workflows: ["Daily ETF Update", "Morning Brief", "Macro Monitor"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip deploy if triggered by a failed upstream workflow
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy data to dist
        run: cp -r data/ dist/data/

      - name: Copy landing.html to dist (legacy)
        run: |
          if [ -f landing.html ]; then
            cp landing.html dist/landing.html
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: ''
