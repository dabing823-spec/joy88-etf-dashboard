name: Code Health

on:
  schedule:
    # 每天台灣時間 08:00 (UTC 00:00) 跑一次
    - cron: '0 0 * * *'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Validate data JSON files
        run: |
          echo "=== Validating JSON files ==="
          FAIL=0
          for f in data/*.json; do
            if python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              SIZE=$(stat -c%s "$f")
              echo "  OK $f ($SIZE bytes)"
              if [ "$SIZE" -lt 10 ]; then
                echo "  WARN: $f is suspiciously small"
                FAIL=1
              fi
            else
              echo "  FAIL $f — invalid JSON"
              FAIL=1
            fi
          done
          exit $FAIL

  notify-failure:
    runs-on: ubuntu-latest
    needs: check
    if: failure()
    steps:
      - name: Send failure notification
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="❌ Code Health 檢查失敗 — type error / build error / JSON 異常 🔗 $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -s -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              -d "message=$MSG"
          fi
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"${MSG}\"}"
          fi
